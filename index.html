<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сканер отгрузки</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    padding: 12px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* SESSION SCREEN */
  .session-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 12px;
    border: 0.5px solid #e0e0e0;
  }
  .session-card h2 {
    font-size: 15px;
    font-weight: 600;
    color: #111;
    margin-bottom: 16px;
  }
  .btn-new {
    width: 100%;
    padding: 14px;
    background: #111;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .divider {
    text-align: center;
    font-size: 13px;
    color: #999;
    margin: 16px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 0.5px;
    background: #e0e0e0;
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .input-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border: 0.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    background: white;
  }
  input[type="text"]:focus {
    border-color: #111;
  }
  .btn-secondary {
    padding: 12px 16px;
    background: white;
    border: 0.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: #111;
    white-space: nowrap;
  }
  .btn-secondary:active { background: #f5f5f5; }

  /* SCAN SCREEN */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .btn-back {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0.5px solid #e0e0e0;
    background: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .session-info {
    flex: 1;
  }
  .session-id {
    font-size: 11px;
    color: #999;
    font-family: monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-label {
    font-size: 13px;
    font-weight: 600;
    color: #111;
  }

  .box-bar {
    background: white;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
    border: 0.5px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .box-label {
    font-size: 13px;
    color: #666;
  }
  .box-number {
    font-size: 22px;
    font-weight: 700;
    color: #111;
  }
  .btn-next-box {
    padding: 8px 14px;
    background: #111;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-next-box:active { background: #333; }

  .scan-field-wrap {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 0.5px solid #e0e0e0;
  }
  .scan-label {
    font-size: 11px;
    color: #999;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #scanInput {
    width: 100%;
    border: none;
    outline: none;
    font-size: 18px;
    font-weight: 600;
    color: #111;
    background: transparent;
    font-family: monospace;
  }

  .status-bar {
    text-align: center;
    font-size: 13px;
    min-height: 20px;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .status-bar.ok { color: #2a7a2a; }
  .status-bar.err { color: #c0392b; }
  .status-bar.loading { color: #999; }

  .scan-log {
    background: white;
    border-radius: 12px;
    border: 0.5px solid #e0e0e0;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
  }
  .log-header {
    padding: 10px 16px;
    border-bottom: 0.5px solid #e0e0e0;
    font-size: 12px;
    color: #999;
    display: flex;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: white;
  }
  .log-item {
    padding: 10px 16px;
    border-bottom: 0.5px solid #f0f0f0;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }
  .log-item:last-child { border-bottom: none; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-dot.ok { background: #2a7a2a; }
  .log-dot.err { background: #c0392b; }
  .log-dot.loading { background: #ccc; }
  .log-barcode {
    font-family: monospace;
    font-size: 13px;
    color: #111;
    flex: 1;
  }
  .log-box {
    font-size: 11px;
    color: #999;
    white-space: nowrap;
  }
  .log-time {
    font-size: 11px;
    color: #bbb;
    white-space: nowrap;
  }
  .empty-log {
    padding: 24px;
    text-align: center;
    color: #bbb;
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- SESSION SCREEN -->
<div class="screen active" id="sessionScreen">
  <div class="session-card">
    <h2>Новая отгрузка</h2>
    <button class="btn-new" onclick="startNewSession()">Начать новую отгрузку</button>
  </div>
  <div class="session-card">
    <h2>Продолжить отгрузку</h2>
    <div class="input-row">
      <input type="text" id="existingId" placeholder="Введите ID отгрузки" />
      <button class="btn-secondary" onclick="continueSession()">Войти</button>
    </div>
  </div>
</div>

<!-- SCAN SCREEN -->
<div class="screen" id="scanScreen">
  <div class="header">
    <button class="btn-back" onclick="goBack()">←</button>
    <div class="session-info">
      <div class="session-label">Отгрузка</div>
      <div class="session-id" id="displayId">—</div>
    </div>
  </div>

  <div class="box-bar">
    <div>
      <div class="box-label">Текущий короб</div>
      <div class="box-number" id="boxNumber">1</div>
    </div>
    <button class="btn-next-box" onclick="nextBox()">Следующий короб →</button>
  </div>

  <div class="scan-field-wrap">
    <div class="scan-label">Сканируйте ШК товара</div>
    <input type="text" id="scanInput" placeholder="ожидание скана..." autocomplete="off" />
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="scan-log">
    <div class="log-header">
      <span>Отсканированные товары</span>
      <span id="scanCount">0</span>
    </div>
    <div id="logList">
      <div class="empty-log">Сканов пока нет</div>
    </div>
  </div>
</div>

<script>
const MAKE_WEBHOOK = 'https://hook.eu2.make.com/8i6b6lb0smbaj24vvabo5z81maxrh1bf';

let sessionId = '';
let currentBox = 1;
let scanCount = 0;
let logItems = [];

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function now() {
  return new Date().toISOString();
}

function timeStr() {
  return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function startNewSession() {
  sessionId = generateUUID();
  currentBox = 1;
  enterScanScreen();
}

function continueSession() {
  const val = document.getElementById('existingId').value.trim();
  if (!val) { alert('Введите ID отгрузки'); return; }
  sessionId = val;
  const boxInput = prompt('С какого номера короба продолжаем?', '1');
  currentBox = parseInt(boxInput) || 1;
  enterScanScreen();
}

function enterScanScreen() {
  scanCount = 0;
  logItems = [];
  document.getElementById('displayId').textContent = sessionId;
  document.getElementById('boxNumber').textContent = currentBox;
  document.getElementById('scanCount').textContent = '0';
  document.getElementById('logList').innerHTML = '<div class="empty-log">Сканов пока нет</div>';
  document.getElementById('statusBar').textContent = '';
  document.getElementById('sessionScreen').classList.remove('active');
  document.getElementById('scanScreen').classList.add('active');
  setTimeout(() => document.getElementById('scanInput').focus(), 100);
}

function goBack() {
  if (!confirm('Выйти из текущей отгрузки?')) return;
  document.getElementById('scanScreen').classList.remove('active');
  document.getElementById('sessionScreen').classList.add('active');
}

function nextBox() {
  currentBox++;
  document.getElementById('boxNumber').textContent = currentBox;
  setStatus('Короб ' + currentBox + ' — сканируйте товары', 'ok');
  document.getElementById('scanInput').focus();
}

function setStatus(msg, type) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar ' + (type || '');
}

function addLogItem(barcode, box, type) {
  const list = document.getElementById('logList');
  const empty = list.querySelector('.empty-log');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `
    <div class="log-dot ${type}"></div>
    <div class="log-barcode">${barcode}</div>
    <div class="log-box">Короб ${box}</div>
    <div class="log-time">${timeStr()}</div>
  `;
  list.insertBefore(item, list.firstChild);

  scanCount++;
  document.getElementById('scanCount').textContent = scanCount;
}

async function sendToMake(barcode) {
  const payload = {
    'ID отгрузки': sessionId,
    'Короб': currentBox,
    'ШК товара': barcode,
    'Дата и время': now()
  };

  try {
    await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return true;
  } catch (e) {
    return false;
  }
}

document.getElementById('scanInput').addEventListener('keydown', async function(e) {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    const barcode = this.value.trim();
    if (!barcode) return;

    this.value = '';
    setStatus('Отправляю...', 'loading');
    addLogItem(barcode, currentBox, 'loading');

    const ok = await sendToMake(barcode);

    const dots = document.querySelectorAll('.log-dot.loading');
    if (dots.length > 0) {
      dots[0].classList.remove('loading');
      dots[0].classList.add(ok ? 'ok' : 'err');
    }

    if (ok) {
      setStatus('✓ ' + barcode + ' — принято', 'ok');
    } else {
      setStatus('Ошибка отправки — проверьте webhook', 'err');
    }

    this.focus();
  }
});

document.getElementById('scanScreen').addEventListener('click', function() {
  document.getElementById('scanInput').focus();
});
</script>
</body>
</html>
